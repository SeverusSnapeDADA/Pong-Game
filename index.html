<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n            background-color: black;\n            color: white;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n\n        // Create the pong paddle and ball objects\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballSize = 10;\n\n        const userPaddle = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            score: 0\n        };\n\n        const computerPaddle = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            score: 0\n        };\n\n        const ball = {\n            x: canvas.width / 2 - ballSize / 2,\n            y: canvas.height / 2 - ballSize / 2,\n            size: ballSize,\n            speed: 5,\n            velocityX: 5,\n            velocityY: 5,\n            color: 'white'\n        };\n\n        function drawRect(x, y, width, height, color) {\n            context.fillStyle = color;\n            context.fillRect(x, y, width, height);\n        }\n\n        function drawArc(x, y, size, color) {\n            context.fillStyle = color;\n            context.beginPath();\n            context.arc(x, y, size, 0, Math.PI * 2, false);\n            context.closePath();\n            context.fill();\n        }\n\n        function draw() {\n            drawRect(0, 0, canvas.width, canvas.height, 'black');\n            drawRect(userPaddle.x, userPaddle.y, userPaddle.width, userPaddle.height, userPaddle.color);\n            drawRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height, computerPaddle.color);\n            drawArc(ball.x, ball.y, ball.size, ball.color);\n            context.font = '50px Arial';\n            context.fillText(userPaddle.score, canvas.width / 4, canvas.height / 5);\n            context.fillText(computerPaddle.score, 3 * canvas.width / 4, canvas.height / 5);\n        }\n\n        function update() {\n            // Move the ball\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n\n            // Ball collision with top and bottom walls\n            if (ball.y + ball.size > canvas.height || ball.y - ball.size < 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n\n            // Ball collision with paddles\n            if (ball.x < userPaddle.x + userPaddle.width &&\n                ball.y > userPaddle.y &&\n                ball.y < userPaddle.y + userPaddle.height) {\n                ball.velocityX = -ball.velocityX;            }\n            if (ball.x + ball.size > computerPaddle.x &&\n                ball.y > computerPaddle.y &&\n                ball.y < computerPaddle.y + computerPaddle.height) {\n                ball.velocityX = -ball.velocityX;\n            }\n\n            // Ball reset and score update\n            if (ball.x < 0) {\n                computerPaddle.score++;\n                resetBall();\n            } else if (ball.x + ball.size > canvas.width) {\n                userPaddle.score++;\n                resetBall();\n            }\n\n            // Computer AI\n            computerPaddle.y = ball.y - computerPaddle.height / 2;\n        }\n\n        function resetBall() {\n            ball.x = canvas.width / 2 - ball.size / 2;\n            ball.y = canvas.height / 2 - ball.size / 2;\n            ball.velocityX = -ball.velocityX;\n        }\n\n        function keyDown(event) {\n            switch (event.key) {\n                case 'ArrowUp':\n                    userPaddle.y -= 20;\n                    break;\n                case 'ArrowDown':\n                    userPaddle.y += 20;\n                    break;\n            }\n        }\n\n        // Event listeners for keyboard input\n        document.addEventListener('keydown', keyDown);\n\n        function gameLoop() {\n            update();\n            draw();\n            requestAnimationFrame(gameLoop);\n        }\n\n        gameLoop();\n    </script>\n</body>\n</html>
